<h1>My Cart</h1>
<div class="products-row">
  @for(product of products; track product.id){
    <div class="product">
      <img ngSrc="/camisaL.webp" width="300" height="400">
      <div class="text">
        <p>{{product.nombre}}</p>
        <div class="price"><p>{{product.precio}}€</p></div>
      </div>
    </div>
  }
</div>

<p class="text">Total Price: {{precioTotal}}€</p>
<button (click)="deleteProducts()">Buy</button>
