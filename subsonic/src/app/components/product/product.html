@if(product){
  <div class="left">
    <img ngSrc="/camisaL.webp" width="500" height="600">
    <img ngSrc="/camisaC.webp" width="500" height="600">
    <div class="front">
      <img ngSrc="/camisaL_frente.webp" width="500" height="600">
      <img ngSrc="/camisaC_frente.jpg" width="500" height="600">
    </div>
  </div>

  <div class="right">
    <h1>{{ product.nombre }}</h1>
    <p>{{ product.precio }}€</p>
    <p>{{ product.info }}</p>
    <p>Color</p>
    @for(type of selectTypes; track type.productColor) {
      <input type="radio" id="{{ type.productColor }}" name="color" value="{{ type.productColor }}" [(ngModel)]="color" (ngModelChange)="color" (click)="toggleColor(type.productColor)">
      <label for="{{ type.productColor }}">{{ type.productColor }}</label>
    }

    <p>Size</p>
    @for(talla of selectedType?.tallas; track talla) {
      <input type="radio" id="{{ selectTalla(talla) }}" name="size" value="{{ selectTalla(talla) }}" [(ngModel)]="size" (ngModelChange)="size" (click)="toggleSize(selectTalla(talla))">
      <label for="{{ selectTalla(talla) }}">{{ selectTalla(talla) }}</label>
    }

    <p></p>
    <button (click) = "Buy()">Add to Cart</button>
    <p>Delivey time 2-4 business days</p>
  </div>
}
